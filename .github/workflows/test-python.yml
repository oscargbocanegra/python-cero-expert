name: Python Testing - Platzi Course

on:
  push:
    paths:
      - '1-Platzi/python_testing/**'
      - '.github/workflows/test-python.yml'
  pull_request:
    paths:
      - '1-Platzi/python_testing/**'
      - '.github/workflows/test-python.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      working-directory: ./1-Platzi/python_testing
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Verify test environment
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "🔍 Test environment verification:"
        echo "Python version: $(python --version)"
        echo "Pytest version: $(python -m pytest --version)"
        echo ""
        echo "📁 Test files found:"
        find tests/ -name "test_*.py" -type f || echo "No test files found"
        echo ""
        echo "🐍 Source files to test:"
        find src/ -name "*.py" -type f || echo "No source files found"
    
    - name: Run tests with pytest
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "🧪 Running all tests..."
        python -m pytest tests/ -v --tb=short --color=yes
    
    - name: Run individual test files
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "📋 Running tests by file..."
        echo "🔍 API Client Tests:"
        python -m pytest tests/test_api_client.py -v --tb=short --color=yes
        echo ""
        echo "🏦 Bank Account Tests:"
        python -m pytest tests/test_bank_account.py -v --tb=short --color=yes
    
    - name: Run tests with coverage
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "📊 Running tests with coverage report..."
        python -m pytest tests/ --cov=src --cov-report=term-missing --cov-report=html -v
    
    - name: Display test results summary
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "✅ Test execution completed!"
        echo "📁 Test files found:"
        find tests/ -name "test_*.py" -type f
        echo ""
        echo "🐍 Source files covered:"
        find src/ -name "*.py" -type f
    
    - name: Upload coverage reports
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./1-Platzi/python_testing/htmlcov/
        retention-days: 5

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
      working-directory: ./1-Platzi/python_testing
      run: |
        echo "🎯 Coverage Summary:" >> coverage_summary.txt
        python -m pytest tests/ --cov=src --cov-report=term-missing | grep -E "(TOTAL|Name)" >> coverage_summary.txt || true
        cat coverage_summary.txt