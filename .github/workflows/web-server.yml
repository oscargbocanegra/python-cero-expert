name: Project - Web Server

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd projects/web-server
          pip install -r requeriments.txt

      - name: Run web server tests
        run: |
          cd projects/web-server
          python -m pytest tests/ || echo "No tests directory found, running basic syntax check"
          python -c "import main; import store; print('Modules imported successfully')"
          
      - name: Test Docker build
        run: |
          cd projects/web-server
          docker build -t web-server-test .

      - name: Test Docker Compose
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: "./projects/web-server/docker-compose.yml"
        
      
        #run: |
        #  cd projects/web-server
        #  docker compose config --quiet
        #  docker compose build
        #  docker compose up -d
        #  sleep 40
        #  curl -f http://localhost:8000 || echo "Web server health check"
        #  docker compose down

  enviroments:
    runs-on: ubuntu-latest

    env:
        platform: linux
        region: us-east-1
        account: 123456789012
        repository: my-web-server-repo
    
    steps:
      - name: "Mostrando variables de entorno"
        run: |
            echo "Platform: ${{ env.platform }}"
            echo "Region: ${{ env.region }}"
            echo "Account: ${{ env.account }}"
            echo "Repository: ${{ env.repository }}"

